<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll for a surprise</title>
<style>
  :root {
    --bg: #fdf6e3;
    --ink: #2b2620;
    --accent: #ff6b35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .hero h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    max-width: 14ch;
  }
  .hero p {
    margin-top: 1rem;
    font-size: 1.1rem;
    opacity: 0.7;
  }
  .arrow {
    margin-top: 3rem;
    font-size: 2rem;
    color: var(--accent);
    animation: bounce 1.6s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(14px); }
  }
  .spacer { height: 60vh; }
  .video-zone {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  video {
    max-width: 90vw;
    max-height: 80vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    background: #000;
  }
  .tap-hint {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--bg);
    padding: 0.6rem 1.2rem;
    border-radius: 999px;
    font-size: 0.9rem;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .tap-hint.show { opacity: 0.9; }
  .tap-overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.45);
    border-radius: 12px;
    cursor: pointer;
  }
  .tap-overlay.show { display: flex; }
  .tap-overlay span {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    padding: 0.8rem 1.6rem;
    border-radius: 999px;
    font-size: 1rem;
  }
  .video-wrap {
    position: relative;
    display: inline-block;
  }
</style>
</head>
<body>

  <section class="hero">
    <h1>Don't scroll down.</h1>
    <p>(okay fine, scroll down)</p>
    <div class="arrow">↓</div>
  </section>

  <div class="spacer"></div>

  <section class="video-zone">
    <div class="video-wrap">
      <video id="surpriseVideo" src="funny.mp4" playsinline></video>
      <div class="tap-overlay" id="tapOverlay"><span>🔊 tap to play</span></div>
    </div>
  </section>

  <script>
    const video = document.getElementById('surpriseVideo');
    const overlay = document.getElementById('tapOverlay');
    let hasTriggered = false;

    function stopAfterThreeSeconds() {
      setTimeout(() => {
        video.pause();
      }, 3000);
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && !hasTriggered) {
          hasTriggered = true;
          video.currentTime = 0;

          const playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise
              .then(() => {
                // Sound played automatically — great
                stopAfterThreeSeconds();
              })
              .catch(() => {
                // Browser blocked autoplay with sound — show tap prompt
                overlay.classList.add('show');
              });
          }
        }
      });
    }, { threshold: 0.6 });

    observer.observe(video);

    overlay.addEventListener('click', () => {
      overlay.classList.remove('show');
      video.currentTime = 0;
      video.play();
      stopAfterThreeSeconds();
    });
  </script>

</body>
</html>
